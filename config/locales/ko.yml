      hero_alt: "로컬버스"
      mission: "우리는 버스가 언제 올지... 막연히 기다려야하는 시골버스의 불편함을 기술로 해결하고 싶었습니다."
      quote_text: "\"버스 도착시간? 우린 그런 거 몰라… 대충 언제 '즈음' 오겠거니 하고 미리 나와서 기다리는 거지\""
      quote_source: "지역의 어르신이 막연히 버스를 기다린다는 기사를 접했습니다."
      problem_stat: "전국 229개 기초자치단체 중 <strong class=\"text-gray-800\">138곳(60.2%)이 소멸위험지역</strong>(통계청 주민등록인구 기반 분석, 2026년 2월 기준)이고, 이 중 상당수 지역에 버스정보시스템(BIS)이 없습니다. 경남 10개 군이 힘을 합쳐 통합 BIS를 구축해도 33억 원, 유지비만 연간 1억 원 이상(2020년 기준). 인구 수천 명의 소읍·면 단위 지역이 감당할 수 있는 규모가 아닙니다."
      problem_cycle: "정보가 없으니 버스를 안 타고, 이용률이 떨어지면 노선이 줄고, 노선이 줄면 더 불편해지는 악순환입니다. 찾아온 관광객도 정류장에서 막막해지면 다시 오지 않습니다."
      tech_intro: "<strong class=\"font-bold text-indigo-800\">로컬버스 알리미</strong>는 별도 단말기도, 수억 원짜리 인프라도 필요 없습니다."
      tech_box_title: "스마트폰과 QR 스티커로 버스 정보를 만듭니다"
      tech_step1: "오픈소스 CMS로<br>노선 관리"
      tech_step2: "버스 앱으로<br>위치 전송"
      tech_step3: "QR 웹으로<br>승객 확인"
      tech_detail: "정류장 표지판의 QR을 찍으면 \"다음 버스 18분 후\"를 바로 확인할 수 있습니다. 앱 설치도, 회원가입도 필요 없습니다."
      tech_outro: "<strong class=\"font-bold text-indigo-800\">로컬버스 알리미</strong>는 버스 정보가 없는 지방 소도시 어디서든 빠르게 도입할 수 있습니다. 코드는 오픈소스로 공개되어, 다른 지자체에 그대로 가져다 쓸 수 있도록 설계되었습니다."
      coverage_title_html: "전국 <span class=\"text-indigo-600\">%{regions_count}개 지역</span>의 <span class=\"text-indigo-600\">%{routes_count}개 노선</span> 정보를 제공합니다."
