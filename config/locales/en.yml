    about:
      title: "When's my bus coming?"
      hero_alt: "LocalBus"
      mission: "We wanted to use technology to solve the frustration of waiting aimlessly for rural buses with no arrival time information."
      quote_text: "\"Bus arrival time? We have no idea… we just come out early and wait around until it shows up.\""
      quote_source: "We came across a news story about elderly residents waiting indefinitely for their buses."
      problem_stat: "Of South Korea's 229 basic local governments, <strong class=\"text-gray-800\">138 (60.2%) are classified as extinction-risk areas</strong> (Statistics Korea resident registration analysis, Feb 2026), and a significant number have no Bus Information System (BIS). Even a joint BIS across 10 counties in South Gyeongsang Province would cost 3.3 billion won to build, with annual maintenance exceeding 100 million won (2020 figures) — well beyond the reach of small towns and townships with only a few thousand residents."
      problem_cycle: "Without information, people stop riding buses. When ridership drops, routes get cut. When routes get cut, it becomes even more inconvenient — a vicious cycle. Tourists who arrive and feel lost at the bus stop simply don't come back."
      tech_intro: "<strong class=\"font-bold text-indigo-800\">LocalBus Notifier</strong> requires no special terminals or multi-million-dollar infrastructure."
      tech_box_title: "Bus information delivered via smartphone and QR stickers"
      tech_step1: "Manage routes<br>with open-source CMS"
      tech_step2: "Send location<br>via driver app"
      tech_step3: "Passengers check<br>via QR web"
      tech_detail: "Scan the QR code on a bus stop sign to instantly see \"Next bus in 18 minutes.\" No app install, no sign-up required."
      tech_outro: "<strong class=\"font-bold text-indigo-800\">LocalBus Notifier</strong> can be quickly adopted in any rural town without bus information. The code is open-source and designed to be reused by other local governments as-is."
      coverage_title_html: "We cover <span class=\"text-indigo-600\">%{regions_count} regions</span> and <span class=\"text-indigo-600\">%{routes_count} routes</span> nationwide."
      region_route_suffix: "routes"
      check_routes_button: "View Bus Routes"
      caution_title: "(Note)"
      caution_body: "This service provides bus information for areas not registered in the local government's Bus Information System (BIS)."
      partners_together: "Our partners."
      nia_name: "NIA"
      nia_full: "한국지능정보사회진흥원"
      molit: "🏛 국토교통부"
